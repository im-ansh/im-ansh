<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200">
  <rect width="600" height="200" fill="#0d1117" rx="10" stroke="#30363d" stroke-width="2"/>
  <line x1="300" y1="0" x2="300" y2="200" stroke="#30363d" stroke-width="4" stroke-dasharray="10,10" />
  <g font-family="monospace" font-size="40" font-weight="bold">
    <text x="40" y="50" text-anchor="middle" fill="#58a6ff" dominant-baseline="middle">
      |
      <animate attributeName="y" values="50; 100; 50; 100; 50" dur="4s" repeatCount="indefinite" />
    </text>
    <text x="560" y="100" text-anchor="middle" fill="#ff7b72" dominant-baseline="middle">
      |
      <animate attributeName="y" values="100; 150; 100; 100; 100" dur="4s" repeatCount="indefinite" />
    </text>
    <text x="50" y="50" text-anchor="middle" fill="#c9d1d9" dominant-baseline="middle">
      o
      <animate attributeName="x" values="50; 550; 50; 550; 50" dur="4s" repeatCount="indefinite" />
      <animate attributeName="y" values="50; 150; 50; 100; 50" dur="4s" repeatCount="indefinite" />
    </text>
  </g>
</svg>
